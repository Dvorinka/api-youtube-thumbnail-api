# Coolify Deployment Configuration
# YouTube Thumbnail API Service

services:
  - name: youtube-thumbnail-api
    type: docker
    image: youtube-thumbnail-api:latest
    ports:
      - "8099:8099"
    environment:
      - PORT=8099
      - ENVIRONMENT=production
      - YOUTUBE_API_KEY={{YOUTUBE_API_KEY}}
      - RAPIDAPI_PROXY_SECRET={{RAPIDAPI_PROXY_SECRET}}
    health_check:
      path: /healthz
      interval: 30
      timeout: 10
      retries: 3
    resources:
      memory: 128Mi
      cpu: 100m
    restart_policy: unless_stopped
    networks:
      - api-network

# Network Configuration
networks:
  api-network:
    driver: bridge

# Deployment Settings
deployment:
  replicas: 1
  strategy: rolling
  rollback_on_failure: true

# Monitoring
monitoring:
  metrics:
    enabled: true
    path: /metrics
  logging:
    driver: json-file
    max_size: 10m
    max_files: 3
