version: '3.8'

services:
  youtube-thumbnail-api:
    build: .
    ports:
      - "30018:30018"
    environment:
      - PORT=30018
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-dev-youtube-key}
      - RAPIDAPI_PROXY_SECRET=${RAPIDAPI_PROXY_SECRET:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:30018/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-network

networks:
  api-network:
    driver: bridge
